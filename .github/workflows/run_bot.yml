name: Crypto Briefing Bot

on:
  schedule:
    # 09:00 KST (00:00 UTC)
    - cron: '0 0 * * *'
    # 12:30 KST (03:30 UTC)
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "API_ID=${{ secrets.API_ID }}" >> .env
          echo "API_HASH=${{ secrets.API_HASH }}" >> .env
          echo "CHANNEL=${{ secrets.CHANNEL }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Restore Telegram Session
        run: |
          echo "${{ secrets.TELEGRAM_SESSION_BASE64 }}" | base64 -d > session.session

      - name: Run Bot
        run: python main.py
